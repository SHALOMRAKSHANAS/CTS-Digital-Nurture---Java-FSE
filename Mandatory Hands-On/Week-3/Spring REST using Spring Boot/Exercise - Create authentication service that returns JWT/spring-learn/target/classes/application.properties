# ===================================================
# Spring Boot JWT Authentication Service - Properties
# ===================================================

# Server port (default is 8080)
server.port=8080

# Application name (used in Spring Actuator and logging)
spring.application.name=spring-learn

# JWT Configuration
# Secret key used to sign and verify JWT tokens (must be at least 256-bit / 32 characters for HS256)
jwt.secret=cognizant-jwt-secret-key-for-hs256-algorithm-2024
# Token validity duration in milliseconds (600000 ms = 10 minutes)
jwt.expiration.ms=600000

# Logging level for the application package (useful for debugging)
logging.level.com.cognizant.springlearn=DEBUG

# Disable Spring Security's auto-generated user (we handle auth ourselves)
spring.security.user.name=ignored
spring.security.user.password=ignored
