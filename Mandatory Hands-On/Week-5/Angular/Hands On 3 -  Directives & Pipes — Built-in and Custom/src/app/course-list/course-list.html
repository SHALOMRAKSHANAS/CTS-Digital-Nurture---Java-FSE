<h2>Available Courses</h2>

<div *ngIf="isLoading">Loading courses...</div>

<ng-template #noCourses>
  <p>No courses available.</p>
</ng-template>

<div *ngIf="!isLoading && courses.length > 0; else noCourses">
  <div *ngFor="let course of courses; index as i; trackBy: trackByCourseId">
    <app-course-card
      [course]="course"
      [enrolled]="course.id === selectedCourseId"
      (enrollRequested)="onEnroll($event)"
    />
  </div>
</div>

<div *ngIf="selectedCourseId">
  <p>Selected course ID: {{ selectedCourseId }}</p>
</div>
