<h1>{{ portalName }}</h1>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<input [(ngModel)]="searchTerm" placeholder="Search courses..." />

<p>Searching for: {{ searchTerm }}</p>

<!--
  [property] is one-way property binding — it sets a DOM property from the component value.
  [(ngModel)] is two-way binding — it synchronises the view and the component in both directions.
-->
