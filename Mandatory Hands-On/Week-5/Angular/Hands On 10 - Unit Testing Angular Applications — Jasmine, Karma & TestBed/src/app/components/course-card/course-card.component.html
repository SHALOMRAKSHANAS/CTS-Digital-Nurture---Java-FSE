<div class="course-card" (click)="courseClick.emit(course.id)">
  <h3>{{ course.name }}</h3>
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits }}</p>
  <p><strong>Grade:</strong> {{ course.gradeStatus }}</p>
  @if (enrolledIds$ | async; as enrolledIds) {
    <button (click)="$event.stopPropagation(); toggleEnrollment(enrolledIds)">
      {{ enrolledIds.includes(course.id) ? 'Unenroll' : 'Enroll' }}
    </button>
  }
</div>
