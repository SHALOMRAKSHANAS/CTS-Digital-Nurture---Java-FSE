<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">
  <div>
    <label for="studentName">Student Name</label>
    <input type="text" id="studentName" formControlName="studentName" />
    <div *ngIf="enrollForm.get('studentName')?.invalid && enrollForm.get('studentName')?.touched" class="error">
      <span *ngIf="enrollForm.get('studentName')?.errors?.['required']">Name is required</span>
      <span *ngIf="enrollForm.get('studentName')?.errors?.['minlength']">Name must be at least 3 characters</span>
    </div>
  </div>

  <div>
    <label for="studentEmail">Student Email</label>
    <input type="email" id="studentEmail" formControlName="studentEmail" />
    <div *ngIf="enrollForm.get('studentEmail')?.invalid && enrollForm.get('studentEmail')?.touched" class="error">
      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['required']">Email is required</span>
      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['email']">Please enter a valid email</span>
      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">Email already taken.</span>
    </div>
  </div>

  <div>
    <label for="courseId">Course ID</label>
    <input type="text" id="courseId" formControlName="courseId" />
    <div *ngIf="enrollForm.get('courseId')?.invalid && enrollForm.get('courseId')?.touched" class="error">
      <span *ngIf="enrollForm.get('courseId')?.errors?.['required']">Course ID is required</span>
      <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">Course code starting with XX is not allowed.</span>
    </div>
  </div>

  <div>
    <label for="preferredSemester">Preferred Semester</label>
    <select id="preferredSemester" formControlName="preferredSemester">
      <option value="">Select</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <div>
    <label>
      <input type="checkbox" formControlName="agreeToTerms" />
      I agree to the terms and conditions
    </label>
    <div *ngIf="enrollForm.get('agreeToTerms')?.invalid && enrollForm.get('agreeToTerms')?.touched" class="error">
      <span>You must agree to the terms</span>
    </div>
  </div>

  <div formArrayName="additionalCourses">
    <label>Additional Courses</label>
    <div *ngFor="let course of additionalCourses.controls; let i = index">
      <div class="additional-course-row">
        <input type="text" [formControl]="additionalCourses.at(i)" placeholder="Course name" />
        <button type="button" (click)="removeCourse(i)">Remove</button>
      </div>
    </div>
    <button type="button" (click)="addCourse()">Add Another Course</button>
  </div>

  <div>
    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    <button type="button" (click)="enrollForm.reset()">Reset</button>
  </div>
</form>
