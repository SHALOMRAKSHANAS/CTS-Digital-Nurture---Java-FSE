<h2>Course Enrollment Form</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
  <div>
    <label for="studentName">Student Name</label>
    <input
      type="text"
      id="studentName"
      name="studentName"
      [(ngModel)]="studentName"
      #nameCtrl="ngModel"
      required
      minlength="3"
    />
    <div *ngIf="nameCtrl.invalid && nameCtrl.touched" class="error">
      <span *ngIf="nameCtrl.errors?.['required']">Name is required</span>
      <span *ngIf="nameCtrl.errors?.['minlength']">Name must be at least 3 characters</span>
    </div>
  </div>

  <div>
    <label for="studentEmail">Student Email</label>
    <input
      type="email"
      id="studentEmail"
      name="studentEmail"
      [(ngModel)]="studentEmail"
      #emailCtrl="ngModel"
      required
      email
    />
    <div *ngIf="emailCtrl.invalid && emailCtrl.touched" class="error">
      <span *ngIf="emailCtrl.errors?.['required']">Email is required</span>
      <span *ngIf="emailCtrl.errors?.['email']">Please enter a valid email</span>
    </div>
  </div>

  <div>
    <label for="courseId">Course ID</label>
    <input
      type="number"
      id="courseId"
      name="courseId"
      [(ngModel)]="courseId"
      #courseIdCtrl="ngModel"
      required
    />
    <div *ngIf="courseIdCtrl.invalid && courseIdCtrl.touched" class="error">
      <span *ngIf="courseIdCtrl.errors?.['required']">Course ID is required</span>
    </div>
  </div>

  <div>
    <label for="preferredSemester">Preferred Semester</label>
    <select
      id="preferredSemester"
      name="preferredSemester"
      [(ngModel)]="preferredSemester"
    >
      <option value="">Select</option>
      <option value="Odd">Odd</option>
      <option value="Even">Even</option>
    </select>
  </div>

  <div>
    <label for="agreeToTerms">
      <input
        type="checkbox"
        id="agreeToTerms"
        name="agreeToTerms"
        [(ngModel)]="agreeToTerms"
        #agreeCtrl="ngModel"
        required
      />
      I agree to the terms and conditions
    </label>
    <div *ngIf="agreeCtrl.invalid && agreeCtrl.touched" class="error">
      <span *ngIf="agreeCtrl.errors?.['required']">You must agree to the terms</span>
    </div>
  </div>

  <div>
    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    <button type="button" (click)="enrollForm.resetForm(); submitted = false">Reset</button>
  </div>
</form>

<div *ngIf="submitted" class="success">
  Enrollment request submitted successfully!
</div>
