<div class="course-card">
  <h3>{{ course.name }}</h3>
  <p><strong>Code:</strong> {{ course.code }}</p>
  <p><strong>Credits:</strong> {{ course.credits }}</p>
  <p><strong>Grade:</strong> {{ course.gradeStatus }}</p>
  <button (click)="toggleEnrollment()">
    {{ isEnrolled ? 'Unenroll' : 'Enroll' }}
  </button>
</div>
